services:
  - type: web
    name: gateway
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: AUTH_SERVICE_URL
        value: "https://auth-service-maksym.fly.dev"  # Replace with your auth service URL
      - key: CAR_SERVICE_URL
        value: "https://car-service.fly.dev"   # Replace with your car service URL
      - key: JWT_SECRET
        value: "dev_access_secret"                    # Add your JWT secret
      - key: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"