services:
  - type: web
    name: api-gateway
    runtime: node
    branch: master
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: AUTH_SERVICE_URL
        value: "https://user-service-nest-1.onrender.com"
      - key: EXPRESS_AUTH_SERVICE_URL
        value: "https://auth-service-still-silence-9406.fly.dev"
      - key: CAR_SERVICE_URL
        value: "https://car-service-jiwj.onrender.com"
      - key: JWT_SECRET
        value: "dev_access_secret"                    # Add your JWT secret
      # Optional: comma-separated extra CORS origins (preview URLs)
      # - key: CORS_ORIGINS
      #   value: "https://your-preview.vercel.app"
      - key: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
