services:
  - type: web
    name: gateway
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: AUTH_SERVICE_URL
        value: "https://your-auth-service.onrender.com"  # Replace with your auth service URL
      - key: CAR_SERVICE_URL
        value: "https://your-car-service.onrender.com"   # Replace with your car service URL
      - key: JWT_SECRET
        value: "your-jwt-secret-here"                    # Add your JWT secret
      - key: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0" 